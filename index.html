<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>JAH STUDIO v1.5β</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div>
    <h1>JAH STUDIO</h1>
    <small>PRINT DESIGN STUDIO</small>
  </div>
  <span>v1.5β</span>
</header>

<main>
  <section class="card">
    <h2>1. テンプレート</h2>
    <label>用途</label>
    <select id="template">
      <option value="a3p">A3縦 / Tシャツ前面・背面</option>
      <option value="a3l">A3横 / トート・横長</option>
      <option value="a4p">A4縦</option>
      <option value="b4p">B4縦</option>
      <option value="b5p">B5縦</option>
      <option value="leftchest">左胸 100×100mm</option>
      <option value="sleeve">袖 90×300mm</option>
      <option value="senjafuda">千社札 45×135mm</option>
      <option value="custom">自由サイズ</option>
    </select>

    <div class="two">
      <div>
        <label>横幅 mm</label>
        <input id="docW" type="number" value="297">
      </div>
      <div>
        <label>高さ mm</label>
        <input id="docH" type="number" value="420">
      </div>
    </div>

    <div class="checks">
      <label><input id="guides" type="checkbox" checked> ガイド</label>
      <label><input id="grid" type="checkbox"> グリッド</label>
      <label><input id="snap" type="checkbox" checked> スナップ</label>
    </div>
  </section>

  <section class="card">
    <h2>2. 素材</h2>
    <input id="imageInput" type="file" accept="image/*,.svg" multiple hidden>
    <div class="tools">
      <button id="addImage">＋画像/SVG</button>
      <button id="addText">＋文字</button>
      <button id="duplicate" class="secondary">複製</button>
      <button id="remove" class="danger">削除</button>
    </div>
    <div class="tools edit-tools">
      <button id="cropBtn" class="secondary">✂ トリミング</button>
      <button id="vectorBtn" class="secondary vector-accent">◆ ベクター化</button>
      <button id="whiteBtn" class="secondary">白抜き</button>
      <button id="blackBtn" class="secondary">黒ベタ</button>
    </div>
    <div class="tools two-buttons">
      <button id="undo" class="secondary">↶ 戻す</button>
      <button id="redo" class="secondary">↷ やり直し</button>
    </div>
    <p class="hint">画像・SVGは何枚でも追加可能。移動・拡大縮小・回転ができます。</p>
  </section>

  <section class="card canvas-card">
    <div class="canvas-title">
      <h2>3. 配置</h2>
      <span id="sizeLabel">297 × 420 mm</span>
    </div>
    <div id="stageShell">
      <div id="canvasWrap"><canvas id="editor"></canvas></div>
    </div>
  </section>

  <section class="card">
    <h2>4. 選択中の素材</h2>
    <div id="selectionInfo" class="info">素材を選択してください</div>

    <div class="two">
      <div><label>横幅 mm</label><input id="objW" type="number" step="0.1"></div>
      <div><label>高さ mm</label><input id="objH" type="number" step="0.1"></div>
    </div>
    <div class="two">
      <div><label>X座標 mm</label><input id="objX" type="number" step="0.1"></div>
      <div><label>Y座標 mm</label><input id="objY" type="number" step="0.1"></div>
    </div>
    <div class="two">
      <div><label>回転 °</label><input id="objAngle" type="number" step="1"></div>
      <div><label>縦横比</label><select id="lockRatio"><option value="on">固定する</option><option value="off">固定しない</option></select></div>
    </div>
    <label>不透明度 <span id="opacityValue">100%</span></label>
    <input id="opacity" type="range" min="0" max="100" value="100">
    <div class="tools three">
      <button id="applyObject" class="secondary">数値を反映</button>
      <button id="centerX" class="secondary">左右中央</button>
      <button id="centerY" class="secondary">上下中央</button>
    </div>
    <div class="tools three">
      <button id="fit" class="secondary">枠に収める</button>
      <button id="front" class="secondary">最前面</button>
      <button id="back" class="secondary">最背面</button>
    </div>
  </section>

  <section class="card">
    <h2>5. レイヤー</h2>
    <div id="layers"></div>
  </section>

  <section class="card">
    <h2>6. 書き出し</h2>
    <div class="tools three">
      <button id="exportPng">PNG</button>
      <button id="exportSvg">SVG</button>
      <button id="exportPdf">PDF</button>
    </div>
    <div class="tools two-buttons">
      <button id="saveProject" class="secondary">今すぐ保存</button>
      <button id="clearProject" class="danger">保存を消去</button>
    </div>
    <div id="status" class="info">自動保存はONです。</div>
  </section>
</main>

<dialog id="textDialog">
  <div class="dialog-body">
    <h3>文字を追加</h3>
    <label>文字</label>
    <input id="textValue" type="text" value="FIVE JAH">
    <label>フォント</label>
    <select id="fontFamily">
      <option value="sans-serif">ゴシック</option>
      <option value="serif">明朝</option>
      <option value="monospace">等幅</option>
      <option value="Impact">Impact</option>
    </select>
    <div class="dialog-actions">
      <button id="cancelText" class="secondary">戻る</button>
      <button id="confirmText">追加</button>
    </div>
  </div>
</dialog>


<dialog id="cropDialog">
  <div class="dialog-body crop-dialog-body">
    <h3>トリミング</h3>
    <canvas id="cropPreview" width="600" height="600"></canvas>
    <div class="crop-grid">
      <label>左 <span id="cropLeftV">0%</span><input id="cropLeft" type="range" min="0" max="45" value="0"></label>
      <label>右 <span id="cropRightV">0%</span><input id="cropRight" type="range" min="0" max="45" value="0"></label>
      <label>上 <span id="cropTopV">0%</span><input id="cropTop" type="range" min="0" max="45" value="0"></label>
      <label>下 <span id="cropBottomV">0%</span><input id="cropBottom" type="range" min="0" max="45" value="0"></label>
    </div>
    <div class="dialog-actions">
      <button id="cancelCrop" class="secondary">戻る</button>
      <button id="applyCrop">適用</button>
    </div>
  </div>
</dialog>

<dialog id="whiteDialog">
  <div class="dialog-body">
    <h3>白抜き</h3>
    <p class="hint">白に近い部分を透明にします。</p>
    <label>白抜きの強さ <span id="whiteValue">235</span></label>
    <input id="whiteThreshold" type="range" min="180" max="254" value="235">
    <div class="dialog-actions">
      <button id="cancelWhite" class="secondary">戻る</button>
      <button id="applyWhite">適用</button>
    </div>
  </div>
</dialog>


<dialog id="vectorDialog">
  <div class="dialog-body vector-dialog-body">
    <h3>ロゴ向けベクター化</h3>
    <p class="hint">黒い部分を本物のSVGパスへ変換します。白い部分は透明になります。</p>
    <canvas id="vectorPreview" width="700" height="520"></canvas>
    <div class="vector-settings">
      <label>しきい値 <span id="vectorThresholdV">160</span>
        <input id="vectorThreshold" type="range" min="0" max="255" value="160">
      </label>
      <label>ノイズ除去 <span id="vectorNoiseV">4</span>
        <input id="vectorNoise" type="range" min="0" max="30" value="4">
      </label>
      <label>輪郭の滑らかさ <span id="vectorSmoothV">4</span>
        <input id="vectorSmooth" type="range" min="0" max="10" value="4">
      </label>
    </div>
    <div id="vectorStatus" class="info">設定を動かすとプレビューが更新されます。</div>
    <div class="dialog-actions vector-actions">
      <button id="cancelVector" class="secondary">キャンセル</button>
      <button id="saveVector" class="secondary">SVG保存</button>
      <button id="applyVector">適用</button>
    </div>
  </div>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>
<script src="script.js"></script>
</body>
</html>
